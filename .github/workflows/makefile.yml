name: TestAddon CI/CD

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

permissions:
  contents: write 


jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Lua
        uses: leafo/gh-actions-lua@v8.0.0
        with:
          luaVersion: '5.1'

      - uses: leafo/gh-actions-luarocks@v4
          
      - name: Install dependencies
        run: |
          luarocks install busted
          luarocks install luacov
          
      - name: Run tests
        run: |
          busted tests/*.test.lua

  release:
    name: Create Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Create release archive
        run: |
          make release

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(gh release list --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName // ""')"

          if [ -n "$previous_tag" ]; then
            {
              printf 'Changes since %s:\n\n' "$previous_tag"
              git log --reverse --pretty=format:'- %s' "$previous_tag..$current_tag"
              printf '\n'
            } > release-notes.md
          else
            {
              printf 'Changes:\n\n'
              git log --reverse --pretty=format:'- %s' "$current_tag"
              printf '\n'
            } > release-notes.md
          fi
          
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body_path: release-notes.md
          draft: true
          prerelease: true

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./RLHelper.zip
          asset_name: RLHelper.zip
          asset_content_type: application/zip
